<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#E9F3FF" />
      <stop offset="100%" stop-color="#F3F9FF" />
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#E6F2FF" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0b66ff" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- background card -->
  <rect x="20" y="40" rx="20" width="920" height="560" fill="url(#g1)" />

  <!-- cloud -->
  <g transform="translate(200,140)">
    <ellipse cx="160" cy="70" rx="120" ry="60" fill="#fff" opacity="0.95" />
    <ellipse cx="100" cy="60" rx="60" ry="42" fill="#fff" opacity="0.95" />
    <ellipse cx="220" cy="50" rx="80" ry="50" fill="#fff" opacity="0.95" />
    <rect x="40" y="80" width="240" height="40" rx="10" fill="#fff" opacity="0.95" />
  </g>

  <!-- servers -->
  <g transform="translate(360,220)">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="url(#g2)" stroke="#D3E9FF" stroke-width="1" filter="url(#softShadow)"/>
    <rect x="180" y="0" width="160" height="160" rx="12" fill="url(#g2)" stroke="#D3E9FF" stroke-width="1" filter="url(#softShadow)"/>
    <!-- indicators -->
    <g fill="#0b66ff" opacity="0.9">
      <rect x="22" y="20" width="12" height="12" rx="2" />
      <rect x="22" y="42" width="60" height="8" rx="4" opacity="0.18"/>
      <rect x="202" y="20" width="12" height="12" rx="2" />
      <rect x="202" y="42" width="60" height="8" rx="4" opacity="0.18"/>
    </g>
  </g>

  <!-- laptop -->
  <g transform="translate(160,320)">
    <rect x="0" y="40" width="240" height="120" rx="12" fill="#fff" stroke="#DDEEFF" />
    <rect x="10" y="50" width="220" height="80" rx="6" fill="#0b66ff" opacity="0.08" />
    <rect x="20" y="60" width="200" height="12" rx="6" fill="#4da3ff" opacity="0.14" />
    <rect x="20" y="80" width="150" height="10" rx="5" fill="#9fbff7" opacity="0.18" />
    <rect x="80" y="170" width="80" height="12" rx="6" fill="#e9f3ff" />
  </g>

  <!-- shield/security -->
  <g transform="translate(620,300)">
    <path d="M48 0c-1 0-2 0-3 .1C27 4 10 20 8 39 6 58 20 78 47 92c27-14 41-34 39-53-2-19-19-35-40-39-1-.1-2-.1-3-.1z" fill="#fff" stroke="#D0E6FF" />
    <path d="M48 10c-11 0-22 7-24 18-2 11 6 23 22 31 16-8 24-20 22-31-2-11-13-18-20-18z" fill="#4da3ff" opacity="0.95" />
    <circle cx="48" cy="46" r="4" fill="#fff" />
  </g>

  <!-- subtle grid lines for tech feel -->
  <g opacity="0.06" stroke="#0b66ff">
    <path d="M120 120h720M120 160h720M120 200h720" />
  </g>

</svg>